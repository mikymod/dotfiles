# ==============================================================================
# HYPRLOCK CONFIGURATION
# ==============================================================================

general {
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.2
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.24
    dots_spacing = 0.2
    dots_center = true
    fade_on_empty = false
    hide_input = false

    outer_color = rgba(33ccffee)
    inner_color = rgba(1a1b26ff)
    font_color = rgba(ffffffff)
    check_color = rgba(00ff99ff)
    fail_color = rgba(ff5f7aff)

    placeholder_text = Enter Password
    fail_text = Authentication Failed ($ATTEMPTS)

    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%H:%M'
    color = rgba(ffffffff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date '+%A, %d %B %Y'
    color = rgba(c9d1d9ff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
